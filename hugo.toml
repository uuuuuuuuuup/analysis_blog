baseURL = ''
languageCode = 'zh-CN'
title = '龟龟投资策略分析报告'
theme = 'PaperMod'

[params]
  description = '基于龟龟投资策略的A股深度分析报告'
  author = '投资分析报告'

  # PaperMod 主题设置
  [params.profileMode]
    enabled = true
    title = "龟龟投资策略分析报告"
    subtitle = "基于龟龟投资策略 v2.0 的A股深度分析 | 40只优质股票全面评估"
    imageUrl = ""
    imageTitle = ""

    [[params.profileMode.buttons]]
      name = "📊 报告汇总"
      url = "/summary/"
    [[params.profileMode.buttons]]
      name = "📈 个股分析"
      url = "/reports/"
    [[params.profileMode.buttons]]
      name = "ℹ️ 关于策略"
      url = "/about/"

  # 搜索设置
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

  # 主页设置
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

[menu]
  [[menu.main]]
    identifier = "home"
    name = "🏠 首页"
    url = "/"
    weight = 10
  [[menu.main]]
    identifier = "summary"
    name = "📊 报告汇总"
    url = "/summary/"
    weight = 20
  [[menu.main]]
    identifier = "reports"
    name = "📈 个股分析"
    url = "/reports/"
    weight = 30
  [[menu.main]]
    identifier = "about"
    name = "ℹ️ 关于"
    url = "/about/"
    weight = 40

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = 'github'
    lineNos = true
    codeFences = true
    guessSyntax = true
    noClasses = false
